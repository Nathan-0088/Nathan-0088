name: Generate Snake

# Executa todo dia à meia-noite e também manualmente
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Gerar a cobrinha
      - uses: Platane/snk@v3
        with:
          github_user_name: Nathan-0088
          outputs: |
            dist/snake.svg

      # Subir a cobrinha para branch output
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
